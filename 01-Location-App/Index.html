<!DOCTYPE html>
<html>
<head>
    <title>My Location</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<div class="container">
    <h1>📍 My Location Tracker</h1>
    
    <button onclick="getLocation()">Get My Location</button>

    <p id="status"></p>

    <div id="result">
        <p><b>Latitude:</b> <span id="lat"></span></p>
        <p><b>Longitude:</b> <span id="lon"></span></p>
    </div>

    <a id="mapLink" target="_blank"></a>
</div>

<script>
function getLocation() {
    const status = document.getElementById("status");

    if (navigator.geolocation) {
        status.innerHTML = "Fetching location...";

        navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
        status.innerHTML = "Geolocation is not supported.";
    }
}

function showPosition(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    document.getElementById("lat").innerHTML = lat;
    document.getElementById("lon").innerHTML = lon;

    document.getElementById("status").innerHTML = "Location Found ✅";

    const link = document.getElementById("mapLink");
    link.href = `https://www.google.com/maps?q=${lat},${lon}`;
    link.innerHTML = "📍 View on Google Maps";
}

function showError(error) {
    document.getElementById("status").innerHTML = "Permission denied or error occurred ❌";
}
</script>

</body>
</html>
